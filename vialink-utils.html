<!DOCTYPE html>
<html lang="ko" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIALinks - 유틸리티</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" href="/favicon.jpg">
    <link rel="stylesheet" href="/index.css">
    <!-- AES 암호화를 위한 CryptoJS 라이브러리 추가 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        body {
            display: block;
            align-items: stretch;
            justify-content: stretch;
            height: auto;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 0;
        }

        .main {
            width: 100%;
            min-width: 0;
            min-height: 100vh;
            height: auto;
            padding: 0;
            margin: 0;
            background: transparent;
            box-shadow: none;
            border-radius: 0;
            overflow: visible;
            position: static;
            transform: none !important;
            animation: none;
        }

        .utils-container {
            width: 100%;
            min-height: 100vh;
            padding: 36px clamp(16px, 3vw, 48px);
        }

        .utils-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .home-btn {
            background-color: #ecf0f3;
            border: none;
            color: #a0a5a8;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            box-shadow: 4px 4px 8px #d1d9e6, -4px -4px 8px #f9f9f9;
        }

        .home-btn:hover {
            color: #4B70E2;
            box-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #f9f9f9;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 10px;
        }

        .tool-card {
            background-color: #ecf0f3;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 8px 8px 16px #d1d9e6, -8px -8px 16px #f9f9f9;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .tool-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #181818;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-area {
            width: 100%;
            background-color: #ecf0f3;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            color: #555;
            resize: none;
            box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #f9f9f9;
            outline: none;
            margin-bottom: 10px;
        }

        .tool-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            background-color: #ecf0f3;
            border: none;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #4B70E2;
            cursor: pointer;
            box-shadow: 3px 3px 6px #d1d9e6, -3px -3px 6px #f9f9f9;
            transition: 0.2s;
        }

        .action-btn:hover {
            box-shadow: 5px 5px 10px #d1d9e6, -5px -5px 10px #f9f9f9;
        }

        .action-btn:active {
            box-shadow: inset 2px 2px 5px #d1d9e6, inset -2px -2px 5px #f9f9f9;
        }

        /* 랜덤 문자열 옵션 스타일 */
        .option-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
        }

        .length-input {
            width: 60px;
            padding: 5px;
            border-radius: 8px;
            border: none;
            box-shadow: inset 2px 2px 4px #d1d9e6, inset -2px -2px 4px #f9f9f9;
            background: #ecf0f3;
            text-align: center;
            outline: none;
        }

        .key-input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        /* 모바일 대응 반응형 스타일 */
        @media screen and (max-width: 768px) {
            .utils-container {
                padding: 20px 15px;
                height: auto;
            }

            .utils-header {
                margin-bottom: 20px;
            }

            .utils-header h2 {
                font-size: 1.5rem !important;
            }

            .tools-grid {
                grid-template-columns: 1fr;
                gap: 20px;
                padding: 5px;
                height: auto;
                overflow-y: visible;
            }

            .tool-card {
                grid-column: auto;
                padding: 20px;
            }

            .tool-card[style*="grid-column"] {
                grid-column: span 1 !important;
            }

            .tool-title {
                font-size: 1.1rem;
            }

            .aes-textareas {
                flex-direction: column;
                gap: 10px !important;
            }

            .input-area {
                font-size: 14px;
            }

            .action-btn {
                padding: 10px 15px;
                white-space: nowrap;
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="utils-container">
            <div class="utils-header">
                <a href="/" class="home-btn" title="돌아가기">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h2 class="title" style="margin: 0; font-size: 2rem;">유틸리티</h2>
                <div style="width: 40px;"></div>
            </div>

            <div class="tools-grid">
                <!-- 1. 메모장 (기존 유지) -->
                <div class="tool-card" style="grid-column: span 2;">
                    <div class="tool-title">
                        <i class="bi bi-journal-text" style="color: #4B70E2;"></i> 메모장
                    </div>
                    <textarea id="notepad-content" class="input-area" style="min-height: 120px;" placeholder="여기에 메모를 작성하세요..."></textarea>
                    <div class="tool-actions">
                        <span id="save-status" style="margin-right: auto; font-size: 0.8rem; color: #888; align-self: center;"></span>
                        <button class="action-btn" onclick="copyText('notepad-content')"><i class="bi bi-clipboard"></i> 복사</button>
                        <button class="action-btn" onclick="clearNotes()" style="color: #e24b4b;"><i class="bi bi-trash"></i> 지우기</button>
                    </div>
                </div>

                <!-- 2. Base64 인코더/디코더 -->
                <div class="tool-card">
                    <div class="tool-title">
                        <i class="bi bi-file-earmark-code" style="color: #4B70E2;"></i> Base64
                    </div>
                    <textarea id="base64-input" class="input-area" style="height: 80px;" placeholder="텍스트 입력..."></textarea>
                    <textarea id="base64-output" class="input-area" style="height: 80px;" placeholder="결과..." readonly></textarea>
                    <div class="tool-actions">
                        <button class="action-btn" onclick="base64Handler('encode')">인코딩</button>
                        <button class="action-btn" onclick="base64Handler('decode')">디코딩</button>
                        <button class="action-btn" onclick="copyText('base64-output')"><i class="bi bi-clipboard"></i></button>
                    </div>
                </div>

                <!-- 3. 랜덤 문자열 생성기 -->
                <div class="tool-card">
                    <div class="tool-title">
                        <i class="bi bi-hash" style="color: #4B70E2;"></i> 랜덤 문자열 생성
                    </div>
                    <div class="option-group">
                        <label class="option-item"><input type="checkbox" id="opt-lower" checked> 소문자 (a-z)</label>
                        <label class="option-item"><input type="checkbox" id="opt-upper"> 대문자 (A-Z)</label>
                        <label class="option-item"><input type="checkbox" id="opt-number"> 숫자 (0-9)</label>
                        <label class="option-item"><input type="checkbox" id="opt-symbol"> 특수문자 (!@#...)</label>
                    </div>
                    <div class="option-item" style="margin-bottom: 10px;">
                        길이: <input type="number" id="rand-length" class="length-input" value="10" min="1" max="100">
                    </div>
                    <textarea id="rand-output" class="input-area" style="height: 50px;" placeholder="생성된 문자열..." readonly></textarea>
                    <div class="tool-actions">
                        <button class="action-btn" onclick="generateRandomString()" style="width: 100%;">생성하기</button>
                        <button class="action-btn" onclick="copyText('rand-output')"><i class="bi bi-clipboard"></i></button>
                    </div>
                </div>

                <!-- 4. AES 암호화/복호화 -->
                <div class="tool-card" style="grid-column: span 2;">
                    <div class="tool-title">
                        <i class="bi bi-shield-lock" style="color: #4B70E2;"></i> AES 암호화/복호화
                    </div>
                    <div class="key-input-container">
                        <input type="text" id="aes-key" class="input-area" style="margin-bottom:0;" placeholder="암호화 키 입력...">
                        <button class="action-btn" onclick="generateAESKey()"><i class="bi bi-key"></i> 키 생성</button>
                    </div>
                    <div class="aes-textareas" style="display: flex; gap: 20px;">
                        <textarea id="aes-input" class="input-area" style="height: 100px;" placeholder="내용 입력..."></textarea>
                        <textarea id="aes-output" class="input-area" style="height: 100px;" placeholder="결과..." readonly></textarea>
                    </div>
                    <div class="tool-actions">
                        <button class="action-btn" onclick="aesHandler('encrypt')">암호화</button>
                        <button class="action-btn" onclick="aesHandler('decrypt')">복호화</button>
                        <button class="action-btn" onclick="copyText('aes-output')"><i class="bi bi-clipboard"></i> 복사</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // 공통 복사 함수
        function copyText(elementId) {
            const content = document.getElementById(elementId).value;
            if (!content) return;
            navigator.clipboard.writeText(content).then(() => {
                Swal.fire({
                    icon: 'success',
                    title: '복사 완료!',
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 1500
                });
            });
        }

        // 1. 메모장 기능
        const notepad = document.getElementById('notepad-content');
        const status = document.getElementById('save-status');
        const savedNotes = localStorage.getItem('vialinks_notepad');
        if (savedNotes) notepad.value = savedNotes;

        notepad.addEventListener('input', () => {
            localStorage.setItem('vialinks_notepad', notepad.value);
            status.textContent = '저장됨';
            setTimeout(() => { status.textContent = ''; }, 2000);
        });

        function clearNotes() {
            if (!notepad.value) return;
            Swal.fire({
                title: '메모를 삭제합니까?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#e24b4b',
                confirmButtonText: '확인',
                cancelButtonText: '취소'
            }).then((result) => {
                if (result.isConfirmed) {
                    notepad.value = '';
                    localStorage.removeItem('vialinks_notepad');
                }
            });
        }

        // 2. Base64 기능
        function base64Handler(type) {
            const input = document.getElementById('base64-input').value;
            const output = document.getElementById('base64-output');
            if (!input) return;
            try {
                if (type === 'encode') {
                    // 유니코드 대응 인코딩
                    output.value = btoa(encodeURIComponent(input).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1)));
                } else {
                    // 유니코드 대응 디코딩
                    output.value = decodeURIComponent(Array.prototype.map.call(atob(input), (c) => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: '오류', text: '올바른 형식이 아닙니다.' });
            }
        }

        // 3. 랜덤 문자열 생성 기능
        function generateRandomString() {
            const length = document.getElementById('rand-length').value;
            const hasLower = document.getElementById('opt-lower').checked;
            const hasUpper = document.getElementById('opt-upper').checked;
            const hasNumber = document.getElementById('opt-number').checked;
            const hasSymbol = document.getElementById('opt-symbol').checked;

            if (!hasLower && !hasUpper && !hasNumber && !hasSymbol) {
                Swal.fire({ icon: 'warning', text: '최소 한 가지 옵션을 선택해주세요.' });
                return;
            }

            const chars = {
                lower: 'abcdefghijklmnopqrstuvwxyz',
                upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
                number: '0123456789',
                symbol: '!@#$%^&*()_+~`|}{[]:;?><,./-='
            };

            let charPool = '';
            if (hasLower) charPool += chars.lower;
            if (hasUpper) charPool += chars.upper;
            if (hasNumber) charPool += chars.number;
            if (hasSymbol) charPool += chars.symbol;

            let result = '';
            for (let i = 0; i < length; i++) {
                result += charPool.charAt(Math.floor(Math.random() * charPool.length));
            }
            document.getElementById('rand-output').value = result;
        }

        // 4. AES 기능
        function generateAESKey() {
            const randomKey = Math.random().toString(36).substring(2, 10) + Math.random().toString(36).substring(2, 10);
            document.getElementById('aes-key').value = randomKey;
        }

        function aesHandler(type) {
            const text = document.getElementById('aes-input').value;
            const key = document.getElementById('aes-key').value;
            const output = document.getElementById('aes-output');

            if (!text || !key) {
                Swal.fire({ icon: 'warning', text: '내용과 키를 모두 입력해주세요.' });
                return;
            }

            try {
                if (type === 'encrypt') {
                    output.value = CryptoJS.AES.encrypt(text, key).toString();
                } else {
                    const bytes = CryptoJS.AES.decrypt(text, key);
                    const decoded = bytes.toString(CryptoJS.enc.Utf8);
                    if (!decoded) throw new Error();
                    output.value = decoded;
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: '오류', text: '복호화에 실패했습니다. 키를 확인하세요.' });
            }
        }
    </script>
</body>

</html>
